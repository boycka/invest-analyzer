<main class="page-shell">
  <section class="hero-card">
    <p class="eyebrow">Analysis to Business Plan</p>
    <h1>Generate the business plan redirect</h1>
    <p class="intro">
      Fill the analysis snapshot, then send it securely to the Business Plan page.
    </p>

    <form class="analysis-form" [formGroup]="form" (ngSubmit)="submit()">
      <label>
        <span>Project name</span>
        <input type="text" formControlName="projectName" />
      </label>

      <label>
        <span>Company name</span>
        <input type="text" formControlName="companyName" />
      </label>

      <label>
        <span>Sector</span>
        <input type="text" formControlName="sector" />
      </label>

      <label>
        <span>Analysis summary</span>
        <textarea rows="4" formControlName="analysisSummary"></textarea>
      </label>

      <div class="grid-two">
        <label>
          <span>Investment amount</span>
          <input type="number" formControlName="investmentAmount" />
        </label>

        <label>
          <span>Target return %</span>
          <input type="number" formControlName="targetReturn" />
        </label>
      </div>

      <label>
        <span>Risk level</span>
        <select formControlName="riskLevel">
          <option value="Faible">Faible</option>
          <option value="Moyen">Moyen</option>
          <option value="Élevé">Élevé</option>
        </select>
      </label>

      @if (errorMessage) {
        <p class="error-message">{{ errorMessage }}</p>
      }

      <button type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Generating...' : 'Generate Business Plan' }}
      </button>
    </form>
  </section>
</main>
