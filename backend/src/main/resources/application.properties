spring.application.name=backend

server.port=8080

# ===============================
# DATABASE
# ===============================

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/tunisia_invest_analyzer?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:analyzer_user}
spring.datasource.password=${DB_PASSWORD:analyzer_password_change_me}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ===============================
# JPA / HIBERNATE
# ===============================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# JWT
# ===============================

jwt.secret=${JWT_SECRET:replace_with_a_long_secret_key_at_least_32_characters}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===============================
# GROQ
# ===============================

groq.api.key=${GROQ_API_KEY:}
groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
groq.api.model=${GROQ_MODEL:}
groq.api.timeout-seconds=${GROQ_TIMEOUT_SECONDS:30}

# ===============================
# PAYPAL
# ===============================

paypal.client-id=${PAYPAL_CLIENT_ID:}
paypal.client-secret=${PAYPAL_CLIENT_SECRET:}
paypal.mode=${PAYPAL_MODE:sandbox}

# ===============================
# BUSINESS PLAN
# ===============================

business-plan.base-url=${BUSINESS_PLAN_BASE_URL:http://localhost/business-plan}